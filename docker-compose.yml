services:
  postgres:
    image: postgres:16-alpine
    container_name: tordex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tordex
      POSTGRES_PASSWORD: tordex
      POSTGRES_DB: tordex
    ports:
      - "5432:5432"
    volumes:
      - tordex-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tordex -d tordex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tordex-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - tordex-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tordex-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: tordex
      MINIO_ROOT_PASSWORD: tordex-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tordex-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: tordex-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 tordex tordex-secret &&
      mc mb --ignore-existing local/tordex-evidence &&
      echo 'Bucket tordex-evidence ready.'
      "
    restart: "no"

  adminer:
    image: adminer:latest
    container_name: tordex-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  redisinsight:
    image: redis/redisinsight:latest
    container_name: tordex-redisinsight
    restart: unless-stopped
    ports:
      - "5540:5540"
    depends_on:
      - redis

volumes:
  tordex-postgres-data:
  tordex-redis-data:
  tordex-minio-data:
